<!--
===================================================================
INDEX.HTML - Faqja kryesore HTML qe permban aplikacionin React
React do "injektoje" gjithcka brenda <div id="root">
===================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Charset per karaktere ndernkombetare (a, o, c, etj.) -->
  <meta charset="UTF-8" />

  <!-- Viewport per responsiveness ne celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Titulli qe del te tab-i i browser-it -->
  <title>STREET — Street Style. No Compromise.</title>

  <!-- Pershkrim per SEO (Google) -->
  <meta name="description" content="STREET — Hoodies, T-shirts, Trousers, Sweatpants, Pants, Sneakers, Fragrances, Socks. Street style, no compromise." />

  <!-- Lidhje me Google Fonts per fontet qe perdorim -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- React do mbushe brenda kesaj kutie te gjithe aplikacionin -->
  <div id="root"></div>

  <!-- Lidhje me file-in kryesor JavaScript te React -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
